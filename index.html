<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Travis & Johanna Baby Guesses</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: rgb(255,222,129);
            font-family: system-ui, sans-serif;
            touch-action: none;
        }
        canvas { display: block; }

        #infoBar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(127,95,173,0.96);
            color: white;
            padding: 14px 18px 16px;
            font-size: 14px;
            z-index: 100;
            display: none;
            box-shadow: 0 2px 16px rgba(0,0,0,0.28);
            line-height: 1.5;
        }
        #infoBar .info-name {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        #infoBar .info-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 18px;
        }
        #infoBar .info-item {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 13px;
        }
        #infoBar .guess-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 10px;
            background: rgba(255,255,255,0.22);
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            padding: 5px 13px;
            border-radius: 20px;
            transition: background 0.15s;
        }
        #infoBar .guess-link:hover {
            background: rgba(255,255,255,0.35);
        }

        #infoBar .close-btn {
            position: absolute;
            top: 10px;
            right: 14px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #launchBtn {
            position: fixed;
            bottom: 28px;
            right: 24px;
            z-index: 999;
            background: #FF8F00;
            color: white;
            border: none;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            font-size: 30px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.35);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }
        #launchBtn:active {
            transform: scale(0.92);
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
        }

        .name-label {
            position: absolute;
            pointer-events: none;
            color: #222;
            font-weight: 700;
            font-size: 13px;
            text-shadow: 0 1px 4px rgba(255,255,255,0.9), 0 2px 6px rgba(0,0,0,0.25);
            z-index: 50;
            transform: translate(-50%, -50%);
            white-space: nowrap;
        }
    </style>
</head>
<body>

<button id="launchBtn">🍼</button>

<div id="infoBar">
    <button class="close-btn" onclick="document.getElementById('infoBar').style.display='none'">✕</button>
    <div class="info-name" id="infoName"></div>
    <div class="info-grid" id="infoGrid"></div>
    <a class="guess-link" href="https://forms.gle/dhJZnhsMKrnLMpsc8" target="_blank" rel="noopener">
        ✏️ Make your guess
    </a>
</div>

<script>
// ====================== CONFIG ======================
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTws9jCtxQoUM2aWmuoXeEaLItav3sgEOs8Qs3PSjNIbBqG4mZFKLHE6U51PcpSzzr2GXKvx88jX1rs/pub?output=csv";

let theData = [];
const STORAGE_KEY = "babyBillChelsie2";
let currentW = window.innerWidth;
let currentH = window.innerHeight;

// ====================== HELPERS ======================
const hairFormatter = (hair) => {
    const map = { brown:"#CC9966", blonde:"#faf0be", black:"#222", red:"#A52A2A", white:"#fff", "none (bald)":"transparent" };
    return map[hair.toLowerCase()] || "#CC9966";
};
const eyeFormatter = (eye) => {
    const map = { blue:"#1e90ff", green:"#32cd32", hazel:"#8e7618", brown:"#451800", purple:"#9932cc" };
    return map[eye.toLowerCase()] || "#222";
};

// ====================== MINI SVG ICONS ======================
function iconHair(color) {
    return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 6 C4 3 8 1 12 3 C16 1 20 3 20 6 C20 10 17 13 17 17 L7 17 C7 13 4 10 4 6Z" fill="${color === 'transparent' ? '#eee' : color}" stroke="white" stroke-width="1.2"/>
        <rect x="7" y="17" width="10" height="3" rx="1.5" fill="white" opacity="0.5"/>
    </svg>`;
}
function iconEye(color) {
    return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="12" cy="12" rx="9" ry="5.5" stroke="white" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="3.2" fill="${color}"/>
        <circle cx="13.2" cy="10.8" r="1" fill="white" opacity="0.7"/>
    </svg>`;
}
function iconGender(isBoy) {
    return isBoy
        ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="10" cy="14" r="5.5" stroke="white" stroke-width="1.8"/><line x1="14" y1="10" x2="20" y2="4" stroke="white" stroke-width="1.8" stroke-linecap="round"/><polyline points="17,4 20,4 20,7" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`
        : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="9" r="5.5" stroke="white" stroke-width="1.8"/><line x1="12" y1="14.5" x2="12" y2="21" stroke="white" stroke-width="1.8" stroke-linecap="round"/><line x1="9" y1="18" x2="15" y2="18" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg>`;
}
function iconScale() {
    return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="17" width="18" height="3" rx="1.5" fill="white" opacity="0.8"/><path d="M12 4 L12 17" stroke="white" stroke-width="1.5" stroke-linecap="round"/><path d="M7 10 L12 4 L17 10" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 10 C5 13.5 9 13.5 9 10" stroke="white" stroke-width="1.5" fill="none"/><path d="M15 10 C15 13.5 19 13.5 19 10" stroke="white" stroke-width="1.5" fill="none"/></svg>`;
}
function iconRuler() {
    return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="8" width="20" height="8" rx="2" stroke="white" stroke-width="1.5"/><line x1="6" y1="12" x2="6" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/><line x1="10" y1="12" x2="10" y2="15" stroke="white" stroke-width="1.5" stroke-linecap="round"/><line x1="14" y1="12" x2="14" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/><line x1="18" y1="12" x2="18" y2="15" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>`;
}

// ====================== DYNAMIC BABY SVG ======================
function generateBabySVG(guess) {
    const isBoy = guess["Boy or Girl?"].toLowerCase() === "boy";
    const swaddleBase = isBoy ? "rgb(101,237,253)" : "rgb(253,101,237)";
    const swaddleRight = isBoy ? "rgb(156,244,254)" : "rgb(254,156,244)";
    const swaddleLeft = isBoy ? "rgb(193,248,255)" : "rgb(254,193,248)";
    const binkieBG = isBoy ? "lightgreen" : "#e0b0ff";
    const binkieRing = isBoy ? "green" : "#C264ff";
    const binkieDot = isBoy ? "forestgreen" : "#cc7DFF";
    const hairColor = hairFormatter(guess["Hair Color"]);
    const eyeColor = eyeFormatter(guess["Eye color?"]);
    return `<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150" viewBox="0 0 100 100">
        <defs><mask id="bby"><rect x="20" y="5" rx="30" height="90" width="60" fill="white"/></mask></defs>
        <rect x="20" y="5" rx="30" height="90" width="60" fill="${swaddleBase}"/>
        <path d="M50 55 L80 35 V72.5" fill="${swaddleRight}" mask="url(#bby)"/>
        <path d="M20 35 L80 72.5 V95 H20" fill="${swaddleLeft}" mask="url(#bby)"/>
        <rect x="27" y="8" rx="25" height="40" width="46" fill="#ffd0bc"/>
        <rect x="24" y="26" rx="2.5" height="5" width="6" fill="#ffd0bc"/>
        <rect x="70" y="26" rx="2.5" height="5" width="6" fill="#ffd0bc"/>
        <ellipse cx="40" cy="23" rx="3" ry="3.2" fill="${eyeColor}"/>
        <ellipse cx="60" cy="23" rx="3" ry="3.2" fill="${eyeColor}"/>
        <path d="M47.5 30 C47 27 53 27 52.5 30" fill="#e6ab8d"/>
        <rect x="43.5" y="32" rx="2" height="9" width="13" fill="${binkieBG}"/>
        <circle cx="50" cy="41.5" r="5.5" fill="none" stroke="${binkieRing}" stroke-width="1.6"/>
        <circle cx="50" cy="36.5" r="3" fill="${binkieDot}"/>
        <path d="M50 16 C48 14 47 6 56 7 C50 9 49 12 50 16 M47 16 C44 13 43 7 52 6 C45 9 46 12 47 16 M53 16 C51 13 52 8 58 8 C53 10 53 13 53 16" fill="${hairColor}"/>
    </svg>`;
}
function svgToDataURL(svg) {
    return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
}

// ====================== MATTER.JS SETUP ======================
const Engine = Matter.Engine,
      Render = Matter.Render,
      World = Matter.World,
      Bodies = Matter.Bodies,
      Body = Matter.Body,
      Composite = Matter.Composite,
      Mouse = Matter.Mouse,
      MouseConstraint = Matter.MouseConstraint,
      Events = Matter.Events,
      Query = Matter.Query;

let engine = Engine.create();
engine.gravity.y = 0.28;

let render = Render.create({
    element: document.body,
    engine: engine,
    options: { width: currentW, height: currentH, wireframes: false, background: 'transparent' }
});

let walls = [];
let nameLabels = [];

// ====================== MOUSE + TOUCH SETUP ======================
const mouse = Mouse.create(render.canvas);
// DO NOT use Mouse.setScale — touch coords are already CSS pixels, scaling breaks mobile

render.mouse = mouse; // keep renderer in sync

const mouseConstraint = MouseConstraint.create(engine, {
    mouse: mouse,
    constraint: { stiffness: 0.9, damping: 0.1, render: { visible: false } }
});

const canvas = render.canvas;

// --- Remove Matter.js's own touch listeners so we can fully own them ---
// Matter.js binds the same handlers to touch events as it does to mouse events.
canvas.removeEventListener('touchstart', mouse.mousedown);
canvas.removeEventListener('touchmove',  mouse.mousemove);
canvas.removeEventListener('touchend',   mouse.mouseup);

// Helper: canvas-relative position from a Touch
function touchToCanvasPos(touch) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: touch.clientX - rect.left,
        y: touch.clientY - rect.top
    };
}

// --- Touch drag: directly drive Matter.js mouse state ---
let touchStartTime = 0;
let touchStartClientX = 0;
let touchStartClientY = 0;

canvas.addEventListener('touchstart', (e) => {
    e.preventDefault(); // stops browser scroll AND stops pointer events firing (no double-tap)
    const t = e.touches[0];
    const pos = touchToCanvasPos(t);

    touchStartTime    = Date.now();
    touchStartClientX = t.clientX;
    touchStartClientY = t.clientY;

    mouse.position.x           = pos.x;
    mouse.position.y           = pos.y;
    mouse.mousedownPosition.x  = pos.x;
    mouse.mousedownPosition.y  = pos.y;
    mouse.button               = 0;       // signal "pressed"
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const pos = touchToCanvasPos(e.touches[0]);
    mouse.position.x = pos.x;
    mouse.position.y = pos.y;
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    const t = e.changedTouches[0];
    mouse.button               = -1;      // signal "released"
    mouse.mouseupPosition.x    = mouse.position.x;
    mouse.mouseupPosition.y    = mouse.position.y;

    // Tap detection on mobile (pointer events are blocked by preventDefault above)
    const duration = Date.now() - touchStartTime;
    const dx = t.clientX - touchStartClientX;
    const dy = t.clientY - touchStartClientY;
    if (duration < 280 && Math.sqrt(dx*dx + dy*dy) < 12) {
        const pos = touchToCanvasPos(t);
        const hit = Query.point(Composite.allBodies(engine.world), pos);
        const baby = hit.find(b => b.userData && b.userData.guessData);
        if (baby) showAllDetails(baby.userData.guessData);
    }
}, { passive: true });

// --- Desktop mouse tap detection (pointer events; don't fire on mobile) ---
let tapStartTime = 0, tapStartX = 0, tapStartY = 0;

canvas.addEventListener('pointerdown', (e) => {
    if (e.pointerType === 'touch') return; // handled above
    tapStartTime = Date.now();
    tapStartX = e.clientX;
    tapStartY = e.clientY;
});

canvas.addEventListener('pointerup', (e) => {
    if (e.pointerType === 'touch') return;
    const duration = Date.now() - tapStartTime;
    const dx = e.clientX - tapStartX;
    const dy = e.clientY - tapStartY;
    if (duration < 280 && Math.sqrt(dx*dx + dy*dy) < 12) {
        const point = { x: e.clientX, y: e.clientY };
        const hit = Query.point(Composite.allBodies(engine.world), point);
        const baby = hit.find(b => b.userData && b.userData.guessData);
        if (baby) showAllDetails(baby.userData.guessData);
    }
});

// ====================== WALLS ======================
function createWalls() {
    if (walls.length) walls.forEach(w => World.remove(engine.world, w));
    walls = [
        Bodies.rectangle(currentW/2, -100,        currentW*2, 200,        { isStatic: true, restitution: 0.96 }),
        Bodies.rectangle(currentW/2, currentH+100, currentW*2, 200,        { isStatic: true, restitution: 0.96 }),
        Bodies.rectangle(-100,        currentH/2,  200,        currentH*2, { isStatic: true, restitution: 0.96 }),
        Bodies.rectangle(currentW+100, currentH/2, 200,        currentH*2, { isStatic: true, restitution: 0.96 })
    ];
    World.add(engine.world, walls);
}

// ====================== STORAGE ======================
function getStored() { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : []; }
function store(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
function merge(existing, incoming) {
    const names = new Set(existing.map(b => b["What's your name?"]));
    return [...existing, ...incoming.filter(b => !names.has(b["What's your name?"]))];
}

// ====================== CREATE BABY ======================
function createBaby(i, guess) {
    const body = Bodies.circle(
        Math.random() * (currentW - 280) + 140,
        Math.random() * (currentH * 0.35) + 100,
        52,
        {
            restitution: 0.95,
            friction: 0.06,
            frictionAir: 0.008,
            density: 0.68,
            render: { sprite: { texture: svgToDataURL(generateBabySVG(guess)), xScale: 1.08, yScale: 1.08 } }
        }
    );
    body.userData = { index: i, name: guess["What's your name?"], guessData: guess };
    return body;
}

// ====================== RENDER BABIES ======================
function renderBabies(data) {
    Composite.clear(engine.world, false);
    createWalls();
    World.add(engine.world, mouseConstraint); // re-add after clear

    nameLabels.forEach(l => document.body.removeChild(l.element));
    nameLabels = [];

    data.forEach((guess, i) => {
        const baby = createBaby(i, guess);
        World.add(engine.world, baby);

        const label = document.createElement("div");
        label.className = "name-label";
        label.textContent = guess["What's your name?"];
        document.body.appendChild(label);
        nameLabels.push({ element: label, body: baby });
    });
}

// ====================== INFO BAR ======================
const infoBar  = document.getElementById("infoBar");
const infoName = document.getElementById("infoName");
const infoGrid = document.getElementById("infoGrid");

function makeInfoItem(iconHTML, text) {
    return `<div class="info-item">${iconHTML}<span>${text}</span></div>`;
}

function showAllDetails(guess) {
    const isBoy     = guess["Boy or Girl?"].toLowerCase() === "boy";
    const hairColor = hairFormatter(guess["Hair Color"]);
    const eyeColor  = eyeFormatter(guess["Eye color?"]);

    infoName.textContent = `${guess["What's your name?"]}'s Guess`;
    const dobKey = Object.keys(guess).find(key => key.includes("Date of Birth"));

    infoGrid.innerHTML = [
        makeInfoItem(iconGender(isBoy), isBoy ? "Boy" : "Girl"),
        makeInfoItem(`<span style="font-size:15px">📅</span>`, dobKey ? guess[dobKey] : "Unknown"),
        makeInfoItem(`<span style="font-size:15px">⏰</span>`, guess["Time of Birth?"]),
        makeInfoItem(iconHair(hairColor), `${guess["Hair Color"]} hair`),
        makeInfoItem(iconEye(eyeColor), `${guess["Eye color?"]} eyes`),
        makeInfoItem(iconScale(), `${guess["Weight? (lbs)"]} lbs ${guess["Weight? (oz)"]} oz`),
        makeInfoItem(iconRuler(), `${guess["Length (in inches)"]} in`),
    ].join("");

    infoBar.style.display = "block";
}

// ====================== LABEL POSITIONS ======================
Events.on(engine, 'afterUpdate', () => {
    nameLabels.forEach(({element, body}) => {
        if (!body) return;
        element.style.left = `${body.position.x}px`;
        element.style.top  = `${body.position.y}px`;
    });
});

// ====================== LAUNCH BUTTON ======================
document.getElementById("launchBtn").addEventListener("click", () => {
    Composite.allBodies(engine.world)
        .filter(b => b.circleRadius)
        .forEach(body => {
            Body.setVelocity(body, { x: (Math.random() - 0.5) * 26, y: -24 - Math.random() * 14 });
            Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.45);
        });
});

// ====================== DATA LOADING ======================
function init() {
    const stored = getStored();
    if (stored.length > 0) { theData = stored; renderBabies(stored); }

    Papa.parse(CSV_URL, {
        download: true,
        header: true,
        complete: (results) => {
            let newData = results.data.filter(row => row["What's your name?"]);
            if (stored.length > 0) {
                const merged = merge(stored, newData);
                if (merged.length > stored.length) { theData = merged; store(merged); renderBabies(merged); }
            } else if (newData.length > 0) {
                theData = newData; store(newData); renderBabies(newData);
            }
        }
    });

    Engine.run(engine);
    Render.run(render);
}

window.addEventListener("load", init);

window.addEventListener("resize", () => {
    currentW = window.innerWidth;
    currentH = window.innerHeight;
    render.canvas.width  = currentW;
    render.canvas.height = currentH;
    render.options.width  = currentW;
    render.options.height = currentH;
    createWalls();
});
</script>
</body>
</html>
